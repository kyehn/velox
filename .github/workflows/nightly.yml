name: Nightly
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
jobs:
  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [fuzz_vt_parser, fuzz_osc_parse, fuzz_grid_resize]
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@nightly
      - run: |
          cd torvox-fuzz
          cargo install cargo-fuzz
          cargo fuzz run ${{ matrix.target }} --fuzz-dir . -manifest-path ./Cargo.toml -- -max_total_time=3600
      - if: failure()
        uses: actions/upload-artifact@master
        with:
          name: fuzz-crash-${{ matrix.target }}
          path: torvox-fuzz/fuzz/artifacts/
  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - run: |
          MIRIFLAGS="-Zmiri-isolation-error=warn" cargo +nightly miri test -p torvox-core
          MIRIFLAGS="-Zmiri-isolation-error=warn" cargo +nightly miri test -p torvox-terminal
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo bench --workspace
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - run: |
          cargo install cargo-audit
          cargo audit
